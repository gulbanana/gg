added = "#a6e3a1"
removed = "#f38ba8"
modified = "#89b4fa"
conflict = "#fab387"

immutableStroke = "#89b4fa"
immutableFill = "#89b4fa"
mutableStroke = "#89b4fa"
mutableFill = "transparent"
workingCopyStroke = "#89b4fa"
workingCopyFill = "#a6e3a1"
conflictStroke = "#f9e2af"
