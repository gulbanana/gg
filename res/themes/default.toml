# GG Default Theme
# Both light and dark variants in one file.

# ─── Light variant ───────────────────────────────────────────────

[light.colors]
# surfaces (5 tiers: background < surfaceDeep < surface < surfaceAlt < surfaceStrong)
background = "#ffffff"
surfaceDeep = "#e8e8ed"
surface = "#f5f5f7"
surfaceAlt = "#e8e8ed"
surfaceStrong = "#d2d2d7"

# foreground / text
foreground = "#1d1d1f"
foregroundMuted = "#6e6e73"
foregroundSubtle = "#8e8e93"
foregroundFaint = "#aeaeb2"

# borders & dividers
outline = "#c6c6cb"
outlineMuted = "#d2d2d7"
outlineStrong = "#aeaeb2"

# semantic status
primary = "#007AFF"
primaryHover = "#0056CC"
primaryContent = "#ffffff"
secondary = "#6750A4"
secondaryHover = "#5740A0"
success = "#34C759"
successContent = "#ffffff"
warning = "#FFCC00"
warningContent = "#1d1d1f"
error = "#FF3B30"
errorContent = "#ffffff"
destructive = "#FF3B30"
destructiveContent = "#ffffff"

# diff / change indicators
added = "#34C759"
removed = "#FF3B30"
modified = "#007AFF"
conflict = "#FF9500"
addedAlt = "#A8FFB4"
removedAlt = "#FFA8A3"
modifiedAlt = "#ffffff"
conflictAlt = "#FFD480"

# graph node palette (semantic)
immutableStroke = "#007AFF"
immutableFill = "#007AFF"
mutableStroke = "#007AFF"
mutableFill = "transparent"
workingCopyStroke = "#007AFF"
workingCopyFill = "#34C759"
conflictStroke = "#FFCC00"
conflictFill = "#FF9500"

# accents
accent = "#007AFF"
accentHover = "#0056CC"
accentMuted = "#AF52DE"
accentSubtle = "#5AC8FA"
highlight = "#FF9500"

# selection / focus
selectionBackground = "#007AFF"
selectionForeground = "#ffffff"
focusRing = "#007AFF"

# overlay
overlayBackground = "rgba(174, 174, 178, 0.4)"
overlayBackdropBlur = "0px"

[light.text]
familyUi = "Bahnschrift, 'DIN Alternate', 'Franklin Gothic Medium', 'Roboto', 'Nimbus Sans', sans-serif-condensed, sans-serif"
familyCode = "ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace"
familyDisplay = "Bahnschrift, 'DIN Alternate', 'Franklin Gothic Medium', sans-serif"
sizeXs = "10px"
sizeSm = "11px"
sizeMd = "13px"
sizeLg = "16px"
sizeXl = "20px"
weightLight = "300"
weightRegular = "400"
weightMedium = "500"
weightHeavy = "700"
lineHeightTight = "1.2"
lineHeightNormal = "1.4"
lineHeightRelaxed = "1.6"

[light.shadows]
shadowSm = "0 1px 2px rgba(0, 0, 0, 0.06)"
shadowMd = "0 2px 6px rgba(0, 0, 0, 0.08)"
shadowLg = "0 4px 12px rgba(0, 0, 0, 0.1)"

[light.components]
# buttons — primary
buttonBackground = "$colors.primary"
buttonForeground = "$colors.primaryContent"
buttonHoverBackground = "$colors.primaryHover"
buttonBorder = "transparent"
buttonRadius = "4px"
buttonHeight = "28px"
buttonPadding = "2px 8px"
buttonShadow = "$shadows.shadowSm"
buttonFont = "$text.familyUi"
buttonFontSize = "$text.sizeMd"
buttonFontWeight = "$text.weightMedium"

# buttons — secondary
buttonSecondaryBackground = "$colors.secondary"
buttonSecondaryForeground = "$colors.foreground"
buttonSecondaryHoverBackground = "$colors.secondaryHover"

# buttons — disabled
buttonDisabledBackground = "rgba(0, 0, 0, 0.04)"
buttonDisabledForeground = "$colors.foregroundFaint"

# buttons — active (pressed)
buttonActiveTransform = "scale(0.98)"
buttonActiveShadow = "0 1px 1px rgba(0, 0, 0, 0.04)"

# inputs
inputBackground = "$colors.background"
inputForeground = "$colors.foreground"
inputBorder = "$colors.outlineMuted"
inputFocusBorder = "$colors.focusRing"
inputRadius = "3px"
inputPadding = "6px"

# border radii
radiusSm = "3px"
radiusMd = "4px"
radiusLg = "6px"

# transitions
transitionFast = "100ms ease"
transitionNormal = "180ms ease"

# borders
borderSubtle = "1px solid $colors.outlineMuted"
borderDialog = "1px solid $colors.surfaceStrong"
separatorWidth = "1px"

# layout
headerHeight = "36px"
toolbarHeight = "38px"

# surfaces
surfacePadding = "8px"
surfacePaddingLg = "16px"
modalPadding = "20px"

# dialogs
dialogBackground = "$colors.background"
dialogBorder = "1px solid $colors.surfaceStrong"
dialogRadius = "6px"
dialogShadow = "$shadows.shadowLg"

# ─── Dark variant ────────────────────────────────────────────────

