# GG Material Theme — Material Design 3 inspired

[light.colors]
background = "#ffffff"
surfaceDeep = "#e7e0ec"
surface = "#fef7ff"
surfaceAlt = "#f3edf7"
surfaceStrong = "#e7e0ec"

foreground = "#1d1b20"
foregroundMuted = "#625b71"
foregroundSubtle = "#79747e"
foregroundFaint = "#aba4b2"

outline = "#cac4d0"
outlineMuted = "#e7e0ec"
outlineStrong = "#79747e"

primary = "#6750A4"
primaryHover = "#4F378B"
primaryContent = "#ffffff"
secondary = "#1b72c0"
secondaryHover = "#1565B0"
success = "#146C2E"
successContent = "#ffffff"
warning = "#E8A317"
warningContent = "#1d1b20"
error = "#B3261E"
errorContent = "#ffffff"
destructive = "#B3261E"
destructiveContent = "#ffffff"

added = "#146C2E"
removed = "#B3261E"
modified = "#1b72c0"
conflict = "#E8731A"
addedAlt = "#A8FFB4"
removedAlt = "#FFA8A3"
modifiedAlt = "#ffffff"
conflictAlt = "#FFD480"

immutableStroke = "#1b72c0"
immutableFill = "#1b72c0"
mutableStroke = "#1b72c0"
mutableFill = "transparent"
workingCopyStroke = "#1b72c0"
workingCopyFill = "#146C2E"
conflictStroke = "#E8A317"
conflictFill = "#E8731A"

accent = "#6750A4"
accentHover = "#4F378B"
accentMuted = "#7e5dc7"
accentSubtle = "#0288D1"
highlight = "#E8731A"

selectionBackground = "#6750A4"
selectionForeground = "#ffffff"
selectionForegroundMuted = "#e7e0ec"
focusRing = "#6750A4"

overlayBackground = "rgba(171, 164, 178, 0.4)"
overlayBackdropBlur = "0px"

[light.text]
familyUi = "'Roboto', 'Google Sans', system-ui, sans-serif"
familyCode = "ui-monospace, 'Roboto Mono', 'Cascadia Code', monospace"
familyDisplay = "'Google Sans', 'Roboto', system-ui, sans-serif"
sizeXs = "10px"
sizeSm = "11px"
sizeMd = "13px"
sizeLg = "16px"
sizeXl = "20px"
weightLight = "300"
weightRegular = "400"
weightMedium = "500"
weightHeavy = "700"
lineHeightTight = "1.2"
lineHeightNormal = "1.4"
lineHeightRelaxed = "1.6"

[light.shadows]
shadowSm = "0 1px 2px rgba(0, 0, 0, 0.1)"
shadowMd = "0 2px 6px rgba(0, 0, 0, 0.12)"
shadowLg = "0 8px 16px rgba(0, 0, 0, 0.15)"

[light.components]
buttonBackground = "$colors.primary"
buttonForeground = "$colors.primaryContent"
buttonHoverBackground = "$colors.primaryHover"
buttonBorder = "transparent"
buttonRadius = "20px"
buttonHeight = "36px"
buttonPadding = "0 16px"
buttonShadow = "$shadows.shadowSm"
buttonFont = "$text.familyUi"
buttonFontSize = "$text.sizeMd"
buttonFontWeight = "$text.weightMedium"

buttonSecondaryBackground = "$colors.surfaceAlt"
buttonSecondaryForeground = "$colors.foreground"
buttonSecondaryHoverBackground = "$colors.surfaceStrong"

buttonDisabledBackground = "rgba(0, 0, 0, 0.04)"
buttonDisabledForeground = "$colors.foregroundFaint"

buttonActiveTransform = "scale(0.98)"
buttonActiveShadow = "0 1px 1px rgba(0, 0, 0, 0.08)"

inputBackground = "$colors.background"
inputForeground = "$colors.foreground"
inputBorder = "$colors.outline"
inputFocusBorder = "$colors.focusRing"
inputRadius = "4px"
inputPadding = "6px"

radiusSm = "4px"
radiusMd = "8px"
radiusLg = "16px"

transitionFast = "100ms ease"
transitionNormal = "200ms ease"

borderSubtle = "1px solid $colors.outline"
borderDialog = "none"
separatorWidth = "1px"

headerHeight = "48px"
toolbarHeight = "38px"

surfacePadding = "8px"
surfacePaddingLg = "16px"
modalPadding = "24px"

dialogBackground = "$colors.background"
dialogBorder = "none"
dialogRadius = "16px"
dialogShadow = "$shadows.shadowLg"

